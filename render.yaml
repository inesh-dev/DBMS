services:
  # Backend Web Service
  - type: web
    name: sahara-backend
    env: python
    region: singapore # Choose the region closest to you
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sahara-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CSRF_TRUSTED_ORIGINS
        value: https://sahara-backend.onrender.com

database:
  name: sahara-db
  region: singapore
  plan: free
